<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago seguro</title>

<style>
body {
  font-family: Arial;
  background: #6a1b9a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: purple;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h3>Pago</h3>

  <form id="formPago">

    <input name="nombre" placeholder="Nombre" required>
    <input name="correo" placeholder="Correo" required>

    <!--  tarjeta limitada -->
    <input id="cardNumber" placeholder="Tarjeta" maxlength="16" required>

    <!--  mantiene / -->
    <input id="cardExp" placeholder="MM/AA" maxlength="5" required>

    <!-- oculto -->
    <input id="cvv" type="password" placeholder="CVV" maxlength="3" required>

    <input id="amount" placeholder="Monto" required>

    <button type="submit">Pagar</button>

  </form>
</div>

<script>
window.onload = () => {

  const form = document.getElementById("formPago");

  // formato MM/AA automático
  const expInput = document.getElementById("cardExp");

  expInput.addEventListener("input", (e) => {
    let val = e.target.value.replace(/\D/g, "");
    if (val.length >= 3) {
      val = val.slice(0,2) + "/" + val.slice(2,4);
    }
    e.target.value = val;
  });

  form.onsubmit = async (e) => {
    e.preventDefault();

    const cardNumber = document.getElementById("cardNumber").value;
    const cvv = document.getElementById("cvv").value;

    // validaciones frontend
    if (cardNumber.length !== 16) {
      alert("La tarjeta debe tener 16 dígitos");
      return;
    }

    if (cvv.length !== 3) {
      alert("CVV inválido");
      return;
    }

    const data = {
      nombre: form.nombre.value,
      correo: form.correo.value,
      cardNumber,
      cardExp: document.getElementById("cardExp").value.replace("/", ""),
      cvv,
      amount: document.getElementById("amount").value
    };

    try {
      const res = await fetch("/api/payment/3d-secure", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const html = await res.text();

      // CORRECTO para Banorte
      const newWindow = window.open();
      newWindow.document.open();
      newWindow.document.write(html);
      newWindow.document.close();

    } catch (error) {
      alert("Error al procesar pago");
    }
  };

};
</script>

</body>
</html>
