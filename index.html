<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pago con Banorte</title>
</head>
<body>

  <h2>Pago con tarjeta</h2>

  <form action="https://backend-banorte.onrender.com/api/payment/create-order" method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>Correo:</label><br>
    <input type="email" name="correo" required><br><br>

    <label>Número de tarjeta:</label><br>
    <input type="text" name="cardNumber" maxlength="16" required><br><br>

    <label>Fecha de expiración (MMAA):</label><br>
    <input type="text" name="cardExp" placeholder="1226" required><br><br>

    <label>CVV:</label><br>
    <input type="password" name="cvv" maxlength="4" required><br><br>

    <label>Monto:</label><br>
    <input type="number" name="amount" value="10" required><br><br>

    <button type="submit">Pagar</button>

  </form>

</body>
</html>
