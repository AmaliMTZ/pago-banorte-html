<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago con tarjeta</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
  transition: 0.2s;
}

/* 🔥 toque morado elegante */
input:focus {
  border-color: #7b1fa2;
  box-shadow: 0 0 4px rgba(123,31,162,0.4);
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #7b1fa2; /* morado */
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4a0072;
}

#resultado {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Pago con tarjeta</h2>

  <form id="formPago">

    <input name="nombre" placeholder="Nombre completo" required>
    <input name="correo" placeholder="Correo electrónico" required>
    <input name="cardNumber" placeholder="Número de tarjeta" required>
    <input id="cardExp" name="cardExp" placeholder="MM/AA" required>
    <input name="cvv" placeholder="CVV" required>
    <input name="amount" value="10.00" required>

    <button type="submit">Pagar</button>

  </form>

  <p id="resultado"></p>
</div>

<script>
const form = document.getElementById("formPago");
const inputExp = document.getElementById("cardExp");
const resultado = document.getElementById("resultado");

// formato MM/AA
inputExp.addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "");
  if (value.length >= 3) {
    value = value.substring(0,2) + "/" + value.substring(2,4);
  }
  e.target.value = value;
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const exp = inputExp.value.replace("/", "");

  const data = {
    nombre: form.nombre.value,
    correo: form.correo.value,
    cardNumber: form.cardNumber.value,
    cardExp: exp,
    cvv: form.cvv.value,
    amount: form.amount.value
  };

  try {
    const res = await fetch("https://backend-banorte.onrender.com/api/payment/3d-secure", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const response = await res.json();

    if (response.success) {
      resultado.innerText = "Procesando pago...";
    } else {
      resultado.innerText = "Error: " + response.message;
    }

  } catch (error) {
    resultado.innerText = "Error de conexión";
  }
});
</script>

</body>
</html>
